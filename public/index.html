<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RailMind — PNR Status</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@400;700&family=Noto+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0a0b0f;
    color: #e8eaf0;
    font-family: 'Noto Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 60px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: #ff6b2b;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
  }

  .logo-text span { color: #ff6b2b; }

  .subtitle {
    color: #7a7f96;
    font-size: 0.78rem;
    font-family: 'Space Mono', monospace;
    margin-bottom: 36px;
    letter-spacing: 1px;
  }

  .card {
    width: 100%;
    max-width: 460px;
    background: #12141a;
    border: 1px solid #252836;
    border-radius: 16px;
    padding: 22px;
    margin-bottom: 18px;
  }

  .field-label {
    font-size: 0.7rem;
    color: #7a7f96;
    font-family: 'Space Mono', monospace;
    letter-spacing: 1px;
    display: block;
    margin-bottom: 10px;
  }

  .input-row { display: flex; gap: 8px; }

  input[type="text"] {
    flex: 1;
    background: #1a1d26;
    border: 1px solid #252836;
    border-radius: 9px;
    padding: 11px 14px;
    color: #e8eaf0;
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 1px;
  }

  input[type="text"]:focus { border-color: rgba(255,107,43,0.6); }
  input[type="text"]::placeholder { color: #3a3d4a; letter-spacing: 0; }

  .btn {
    background: #ff6b2b;
    color: #fff;
    border: none;
    border-radius: 9px;
    padding: 11px 20px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.88rem;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    white-space: nowrap;
  }

  .btn:hover:not(:disabled) { background: #e55a1e; transform: scale(1.02); }
  .btn:disabled { background: #5a3018; color: #a06040; cursor: not-allowed; }

  .error-msg {
    margin-top: 12px;
    padding: 10px 13px;
    background: rgba(231,76,60,0.09);
    border: 1px solid rgba(231,76,60,0.22);
    border-radius: 8px;
    font-size: 0.76rem;
    color: #e74c3c;
    font-family: 'Space Mono', monospace;
  }

  /* ── RESULT CARD ── */
  .result-card {
    width: 100%;
    max-width: 460px;
    background: #12141a;
    border: 1px solid #252836;
    border-radius: 16px;
    overflow: hidden;
    animation: fadeUp 0.32s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .banner {
    padding: 11px 20px;
    border-bottom: 1px solid #252836;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.72rem;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .train-section { padding: 20px 20px 0; }

  .train-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 3px;
  }

  .train-meta {
    font-size: 0.7rem;
    color: #7a7f96;
    font-family: 'Space Mono', monospace;
  }

  .journey {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 18px 0 4px;
  }

  .j-end { text-align: center; }

  .j-time {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 1.1rem;
  }

  .j-station {
    font-size: 0.65rem;
    color: #7a7f96;
    margin-top: 3px;
  }

  .j-mid {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  .j-date {
    font-size: 0.62rem;
    color: #7a7f96;
    font-family: 'Space Mono', monospace;
  }

  .j-line {
    width: 100%;
    height: 1px;
    background: #252836;
    position: relative;
  }

  .j-dot {
    position: absolute;
    top: -3px; left: 50%;
    transform: translateX(-50%);
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #ff6b2b;
  }

  .divider { height: 1px; background: #252836; margin: 16px 20px 0; }

  .pax-section { padding: 14px 20px 20px; }

  .pax-heading {
    font-size: 0.68rem;
    color: #7a7f96;
    font-family: 'Space Mono', monospace;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .pax-list { display: flex; flex-direction: column; gap: 8px; }

  .pax-item {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 10px 12px;
    background: #1a1d26;
    border-radius: 10px;
    border: 1px solid #252836;
  }

  .pax-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255,107,43,0.13);
    color: #ff6b2b;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    flex-shrink: 0;
  }

  .pax-info { flex: 1; min-width: 0; }
  .pax-name { font-size: 0.82rem; font-weight: 500; }
  .pax-seat { font-size: 0.68rem; color: #7a7f96; font-family: 'Space Mono', monospace; margin-top: 2px; }

  .badge {
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 0.68rem;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    flex-shrink: 0;
  }

  .hint {
    margin-top: 24px;
    font-size: 0.68rem;
    color: #2a2d3a;
    font-family: 'Space Mono', monospace;
    text-align: center;
    line-height: 1.8;
  }

  .loading-dots::after {
    content: '';
    animation: dots 1s steps(3, end) infinite;
  }

  @keyframes dots {
    0%   { content: '.'; }
    33%  { content: '..'; }
    66%  { content: '...'; }
  }
</style>
</head>
<body>

<div class="logo-row">
  <div class="logo-icon">🚂</div>
  <div class="logo-text">Rail<span>Mind</span></div>
</div>
<p class="subtitle">PNR STATUS CHECKER</p>

<div class="card">
  <span class="field-label">ENTER 10-DIGIT PNR NUMBER</span>
  <div class="input-row">
    <input type="text" id="pnrInput" placeholder="e.g. 4810234567" maxlength="10"
      oninput="this.value=this.value.replace(/\D/g,'')"
      onkeydown="if(event.key==='Enter')  checkPNR()" />
    <button class="btn" id="checkBtn" onclick="checkPNR()">Check →</button>
  </div>
  <div id="errorMsg" style="display:none" class="error-msg"></div>
</div>

<div id="resultCard" style="display:none" class="result-card"></div>



<script>
async function checkPNR(){

    const pnr = document.getElementById("pnrInput").value;

    const response = await fetch(`/pnrStatus/${pnr}`);

    const result = await response.json();

    const data = result.data;
    const passenger = data.passengerList[0];

    document.getElementById("result").innerHTML = `
    
    <h2>Train Details</h2>

    <table>
        <tr><th>Train</th><td>${data.trainName}</td></tr>
        <tr><th>Train Number</th><td>${data.trainNumber}</td></tr>
        <tr><th>From</th><td>${data.sourceStation}</td></tr>
        <tr><th>To</th><td>${data.destinationStation}</td></tr>
        <tr><th>Journey Date</th><td>${data.dateOfJourney}</td></tr>
        <tr><th>Class</th><td>${data.journeyClass}</td></tr>
        <tr><th>Chart Status</th><td>${data.chartStatus}</td></tr>
    </table>

    <h2>Passenger Status</h2>

    <table>
        <tr>
            <th>Passenger</th>
            <th>Status</th>
            <th>Coach</th>
            <th>Berth</th>
        </tr>

        <tr>
            <td>${passenger.passengerSerialNumber}</td>
            <td>${passenger.currentStatus}</td>
            <td>${passenger.currentCoachId}</td>
            <td>${passenger.currentBerthNo} (${passenger.currentBerthCode})</td>
        </tr>
    </table>

    `;
}

function badgeStyle(s) {
  if (s === "CNF")          return "background:rgba(46,204,113,0.15);color:#2ecc71";
  if (s.startsWith("WL"))  return "background:rgba(231,76,60,0.15);color:#e74c3c";
  if (s.startsWith("RAC")) return "background:rgba(255,179,71,0.15);color:#ffb347";
  return "background:rgba(122,127,150,0.15);color:#7a7f96";
}

function bannerStyle(passengers) {
  const allCnf = passengers.every(p => p.status === "CNF");
  const hasWl  = passengers.some(p => p.status.startsWith("WL"));
  if (allCnf) return { bg: "rgba(46,204,113,0.09)", color: "#2ecc71", icon: "✓", text: "ALL PASSENGERS CONFIRMED" };
  if (hasWl)  return { bg: "rgba(231,76,60,0.09)",  color: "#e74c3c", icon: "⚠", text: "WAITLISTED — CHART NOT PREPARED" };
  return             { bg: "rgba(255,179,71,0.09)",  color: "#ffb347", icon: "◎", text: "RAC — RESERVATION AGAINST CANCELLATION" };
}


</script>
</body>
</html>
